<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceHub Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

header h1{
color:#38bdf8;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

h2{
margin-bottom:15px;
color:#38bdf8;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#38bdf8;
color:black;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:bold;
color:#4ade80;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
background:#1e293b;
}
</style>
</head>
<body>

<header>
<h1>FinanceHub Pro</h1>
<p>All Financial Calculators in One Place</p>
</header>

<div class="container">

<div class="grid">

<!-- EMI -->
<div class="card">
<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount">

<input type="number" id="rate" placeholder="Interest Rate %">

<input type="number" id="months" placeholder="Months">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="emiResult"></div>
</div>

<!-- SIP -->
<div class="card">
<h2>SIP Calculator</h2>

<input type="number" id="sipAmount" placeholder="Monthly Investment">

<input type="number" id="sipRate" placeholder="Annual Return %">

<input type="number" id="sipYears" placeholder="Years">

<button onclick="calculateSIP()">Calculate SIP</button>

<div class="result" id="sipResult"></div>
</div>

<!-- Compound -->
<div class="card">
<h2>Compound Interest</h2>

<input type="number" id="principal" placeholder="Principal">

<input type="number" id="interest" placeholder="Rate %">

<input type="number" id="years" placeholder="Years">

<button onclick="calculateCompound()">Calculate</button>

<div class="result" id="compoundResult"></div>
</div>

<!-- Currency -->
<div class="card">
<h2>Currency Converter</h2>

<input type="number" id="usd" placeholder="USD">

<button onclick="convertCurrency()">Convert to INR</button>

<div class="result" id="currencyResult"></div>
</div>

</div>
</div>

<footer>
© 2026 FinanceHub Pro
</footer>

<script>

function calculateEMI(){

let P=parseFloat(document.getElementById("loan").value);
let annual=parseFloat(document.getElementById("rate").value);
let N=parseFloat(document.getElementById("months").value);

let R=annual/12/100;

let emi=(P*R*Math.pow(1+R,N))/
(Math.pow(1+R,N)-1);

document.getElementById("emiResult").innerHTML=
"₹ "+emi.toFixed(2);
}

function calculateSIP(){

let monthly=parseFloat(document.getElementById("sipAmount").value);

let annual=parseFloat(document.getElementById("sipRate").value);

let years=parseFloat(document.getElementById("sipYears").value);

let r=annual/12/100;
let n=years*12;

let future=
monthly*((Math.pow(1+r,n)-1)/r)*(1+r);

document.getElementById("sipResult").innerHTML=
"₹ "+future.toFixed(2);
}

function calculateCompound(){

let p=parseFloat(document.getElementById("principal").value);

let r=parseFloat(document.getElementById("interest").value);

let t=parseFloat(document.getElementById("years").value);

let amount=p*Math.pow((1+r/100),t);

document.getElementById("compoundResult").innerHTML=
"₹ "+amount.toFixed(2);
}

function convertCurrency(){

let usd=parseFloat(document.getElementById("usd").value);

let inr=usd*88.64;

document.getElementById("currencyResult").innerHTML=
"₹ "+inr.toFixed(2);
}

</script>

</body>
</html>
