<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Hedgehog Finance Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
font-size:24px;
font-weight:700;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.result{
margin-top:15px;
font-size:20px;
font-weight:700;
color:#38bdf8;
}

</style>
</head>

<body>

<header>
<div class="logo">🦔 Hedgehog Finance</div>
</header>

<div class="container">

<div class="grid">

<div class="card">

<h2>SIP Calculator</h2>

<input id="amount" placeholder="Monthly Investment">
<input id="rate" placeholder="Return %">
<input id="years" placeholder="Years">

<div class="result" id="sipResult">
₹0
</div>

</div>

</div>

</div>

<script>

const inputs=document.querySelectorAll("input");

inputs.forEach(i=>{
i.addEventListener("input",calculate);
});

function calculate(){

let p=parseFloat(amount.value)||0;
let r=(parseFloat(rate.value)||0)/12/100;
let n=(parseFloat(years.value)||0)*12;

let fv=p*((Math.pow(1+r,n)-1)/r)*(1+r);

sipResult.innerHTML=
"₹ "+fv.toFixed(2);

}

</script>

</body>
</html>
